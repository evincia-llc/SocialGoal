# Legacy CI: reproducible build of the (now SDK-style, Sprint 4/D13) solution
# from a fresh clone. Mirrors docs/BUILD.md exactly -- if you change one,
# change both, and prove the steps first.
name: legacy-ci

on:
  push:
    branches: [master, "sprint/**", "docs/**"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legacy-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Locate MSBuild
        uses: microsoft/setup-msbuild@v2

      # The characterization tests hit (localdb)\MSSQLLocalDB. Start it up
      # front so a wedged/absent instance fails loudly here, not as a hang
      # inside the NUnit run (see journal 2026-07-24: orphaned-instance
      # corruption).
      - name: Ensure LocalDB is up
        run: |
          sqllocaldb info MSSQLLocalDB
          sqllocaldb start MSSQLLocalDB

      # Sprint 4 (D13): every project is SDK-style PackageReference under
      # central package management with committed lock files -- restore runs
      # locked so CI proves the graph is exactly what is committed. The old
      # shim set (net45/net48 targeting packs, VSToolsPath web targets) is
      # gone: the web-application targets are a pinned NuGet dependency of the
      # Web project itself, and the runner's VS provides targeting packs.
      - name: Restore (locked mode)
        run: >-
          msbuild source\SocialGoal.sln /t:Restore /p:Configuration=Release
          /p:RestoreLockedMode=true /v:minimal

      - name: Build (Release)
        run: msbuild source\SocialGoal.sln /p:Configuration=Release /m /v:minimal

      # Phase 1 exit-gate criterion: the first class library compiles for
      # .NET 10. The .NET 10 SDK needs MSBuild 18 while the System.Web project
      # needs desktop MSBuild 17, so this flavor builds via the dotnet CLI as
      # an opt-in (journal 2026-07-24). The scratch lock path keeps the
      # committed net48 lock file out of the throwaway net10 restore graph.
      - name: Prove SocialGoal.Core on .NET 10
        run: >-
          dotnet build source\SocialGoal.Core\SocialGoal.Core.csproj
          -c Release -f net10.0 -p:IncludeNet10=true
          "-p:NuGetLockFilePath=${{ runner.temp }}\core-net10.lock.json"

      # NUnit 3 console runner stays a pinned tool install; SDK-style output
      # adds the net48 TFM subfolder to the Tests path (Sprint 4).
      - name: Install NUnit console runner
        run: nuget install NUnit.ConsoleRunner -Version 3.22.0 -OutputDirectory .buildtools -NonInteractive

      - name: Run NUnit suite
        run: >-
          .buildtools\NUnit.ConsoleRunner.3.22.0\tools\nunit3-console.exe
          source\SocialGoal.Tests\bin\Release\net48\SocialGoal.Tests.dll
          --result=TestResult.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nunit-results
          path: TestResult.xml

      # Coverage (Sprint 2): rerun the suite under OpenCover scoped to the
      # solution's own assemblies, render a summary, and enforce the exit-gate
      # floor -- the data layer must never fall back to 0%.
      - name: Measure coverage (OpenCover)
        run: |
          nuget install OpenCover -Version 4.7.1221 -OutputDirectory .buildtools -NonInteractive
          # -register:user is a known profiler-attach flake on hosted runners
          # (empty "No results" coverage while tests pass). Use registration-free
          # path64 and verify the output actually profiled our assemblies,
          # retrying once before failing loudly.
          $attempt = 0
          do {
            $attempt++
            .buildtools\OpenCover.4.7.1221\tools\OpenCover.Console.exe -register:path64 `
              -target:".buildtools\NUnit.ConsoleRunner.3.22.0\tools\nunit3-console.exe" `
              -targetargs:"source\SocialGoal.Tests\bin\Release\net48\SocialGoal.Tests.dll" `
              -filter:"+[SocialGoal*]* -[SocialGoal.Tests]*" `
              -output:coverage.xml -returntargetcode
            if ($LASTEXITCODE -ne 0) { Write-Host "::error::Test run under OpenCover failed (exit $LASTEXITCODE)"; exit 1 }
            $profiled = Select-String -Path coverage.xml -Pattern "SocialGoal.Data.dll" -Quiet
            if (-not $profiled) { Write-Host "OpenCover attempt ${attempt}: profiler produced no module data; retrying" }
          } until ($profiled -or $attempt -ge 2)
          if (-not $profiled) { Write-Host "::error::OpenCover produced no coverage for solution assemblies after $attempt attempts"; exit 1 }

      - name: Render coverage summary and enforce data-layer floor
        run: |
          dotnet tool install dotnet-reportgenerator-globaltool --tool-path .buildtools\rg --version 5.4.1
          .buildtools\rg\reportgenerator -reports:coverage.xml -targetdir:coverage-report "-reporttypes:HtmlInline;MarkdownSummaryGithub;JsonSummary"
          Get-Content coverage-report\SummaryGithub.md | Add-Content $env:GITHUB_STEP_SUMMARY
          $summary = Get-Content coverage-report\Summary.json -Raw | ConvertFrom-Json
          $data = $summary.coverage.assemblies | Where-Object { $_.name -eq "SocialGoal.Data" }
          if (-not $data) { Write-Host "::error::SocialGoal.Data missing from coverage results"; exit 1 }
          Write-Host ("SocialGoal.Data line coverage: {0}%" -f $data.coverage)
          if ([double]$data.coverage -le 0) {
            Write-Host "::error::Data layer back at 0% line coverage (Sprint 2 exit-gate floor)"
            exit 1
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report

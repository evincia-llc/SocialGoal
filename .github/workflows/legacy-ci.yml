# Legacy CI: reproducible build of the .NET Framework 4.5 solution from a
# fresh clone (Sprint 1 exit-gate criterion). Mirrors docs/BUILD.md exactly --
# if you change one, change both, and prove the steps first.
name: legacy-ci

on:
  push:
    branches: [master, "sprint/**", "docs/**"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: legacy-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Locate MSBuild
        uses: microsoft/setup-msbuild@v2

      # The characterization tests hit (localdb)\MSSQLLocalDB. Start it up
      # front so a wedged/absent instance fails loudly here, not as a hang
      # inside the NUnit run (see journal 2026-07-24: orphaned-instance
      # corruption).
      - name: Ensure LocalDB is up
        run: |
          sqllocaldb info MSSQLLocalDB
          sqllocaldb start MSSQLLocalDB

      - name: Restore app packages
        run: nuget restore source\SocialGoal.sln -NonInteractive

      # Two vendor retirements break a stock build of this 2013-era solution
      # (WebApplication.targets absent; .NET 4.5 targeting pack retired), and
      # NUnit 2.6.3 suites need the retired 2.x console. Pinned shims, same as
      # local dev -- rationale in docs/BUILD.md.
      - name: Restore build/test shims
        run: |
          nuget install MSBuild.Microsoft.VisualStudio.Web.targets -Version 14.0.0.3 -OutputDirectory .buildtools -NonInteractive
          nuget install Microsoft.NETFramework.ReferenceAssemblies.net45 -Version 1.0.3 -OutputDirectory .buildtools -NonInteractive
          nuget install NUnit.Runners -Version 2.6.4 -OutputDirectory .buildtools -NonInteractive

      - name: Build (Release)
        run: >-
          msbuild source\SocialGoal.sln /p:Configuration=Release /m /v:minimal
          /p:VSToolsPath="${{ github.workspace }}\.buildtools\MSBuild.Microsoft.VisualStudio.Web.targets.14.0.0.3\tools\VSToolsPath"
          /p:TargetFrameworkRootPath="${{ github.workspace }}\.buildtools\Microsoft.NETFramework.ReferenceAssemblies.net45.1.0.3\build"

      - name: Run NUnit suite
        run: >-
          .buildtools\NUnit.Runners.2.6.4\tools\nunit-console.exe
          source\SocialGoal.Tests\bin\Release\SocialGoal.Tests.dll
          /framework:net-4.5 /noshadow /xml:TestResult.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nunit-results
          path: TestResult.xml

      # Coverage (Sprint 2): rerun the suite under OpenCover scoped to the
      # solution's own assemblies, render a summary, and enforce the exit-gate
      # floor -- the data layer must never fall back to 0%.
      - name: Measure coverage (OpenCover)
        run: |
          nuget install OpenCover -Version 4.7.1221 -OutputDirectory .buildtools -NonInteractive
          # -register:user is a known profiler-attach flake on hosted runners
          # (empty "No results" coverage while tests pass). Use registration-free
          # path64 and verify the output actually profiled our assemblies,
          # retrying once before failing loudly.
          $attempt = 0
          do {
            $attempt++
            .buildtools\OpenCover.4.7.1221\tools\OpenCover.Console.exe -register:path64 `
              -target:".buildtools\NUnit.Runners.2.6.4\tools\nunit-console.exe" `
              -targetargs:"source\SocialGoal.Tests\bin\Release\SocialGoal.Tests.dll /framework:net-4.5 /noshadow" `
              -filter:"+[SocialGoal*]* -[SocialGoal.Tests]*" `
              -output:coverage.xml -returntargetcode
            if ($LASTEXITCODE -ne 0) { Write-Host "::error::Test run under OpenCover failed (exit $LASTEXITCODE)"; exit 1 }
            $profiled = Select-String -Path coverage.xml -Pattern "SocialGoal.Data.dll" -Quiet
            if (-not $profiled) { Write-Host "OpenCover attempt ${attempt}: profiler produced no module data; retrying" }
          } until ($profiled -or $attempt -ge 2)
          if (-not $profiled) { Write-Host "::error::OpenCover produced no coverage for solution assemblies after $attempt attempts"; exit 1 }

      - name: Render coverage summary and enforce data-layer floor
        run: |
          dotnet tool install dotnet-reportgenerator-globaltool --tool-path .buildtools\rg --version 5.4.1
          .buildtools\rg\reportgenerator -reports:coverage.xml -targetdir:coverage-report "-reporttypes:HtmlInline;MarkdownSummaryGithub;JsonSummary"
          Get-Content coverage-report\SummaryGithub.md | Add-Content $env:GITHUB_STEP_SUMMARY
          $summary = Get-Content coverage-report\Summary.json -Raw | ConvertFrom-Json
          $data = $summary.coverage.assemblies | Where-Object { $_.name -eq "SocialGoal.Data" }
          if (-not $data) { Write-Host "::error::SocialGoal.Data missing from coverage results"; exit 1 }
          Write-Host ("SocialGoal.Data line coverage: {0}%" -f $data.coverage)
          if ([double]$data.coverage -le 0) {
            Write-Host "::error::Data layer back at 0% line coverage (Sprint 2 exit-gate floor)"
            exit 1
          }

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage-report
